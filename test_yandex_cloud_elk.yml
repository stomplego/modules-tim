---
- name: Test Yandex Cloud ELK collection module
  hosts: localhost
  gather_facts: no
  
  tasks:
    - name: Create file using collection module
      my_own_namespace.yandex_cloud_elk.my_own_module:
        path: "/tmp/yandex_cloud_elk_test.txt"
        content: |
          This file was created by my custom collection!
          Namespace: my_own_namespace.yandex_cloud_elk
          Module: my_own_module
          Date: {{ ansible_date_time.date | default('unknown') }}
      register: result
    
    - name: Display result
      debug:
        msg:
          - "Changed: {{ result.changed }}"
          - "Path: {{ result.path }}"
          - "Content: {{ result.content }}"
    
    - name: Verify file content
      command: cat /tmp/yandex_cloud_elk_test.txt
      register: file_content
    
    - name: Show file content
      debug:
        msg: "File content:\n{{ file_content.stdout }}"
