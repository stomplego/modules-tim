---
- name: Single task - Create file with custom module
  hosts: localhost
  gather_facts: no
  
  tasks:
    - name: Create text file using my_own_module
      my_own_module:
        path: "/tmp/my_module_test.txt"
        content: "Hello from my custom Ansible module!"
      register: result
    
    - name: Display result
      debug:
        msg: 
          - "File path: {{ result.path }}"
          - "Content written: {{ result.content }}"
          - "Changed: {{ result.changed }}"
