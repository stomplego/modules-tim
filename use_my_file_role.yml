---
- name: Deploy files using my_file_role
  hosts: localhost
  gather_facts: yes
  vars:
    default_file_path: "/tmp/deployment_default.txt"
    config_file_path: "/opt/app/config.txt"
    log_file_path: "/var/log/myapp/deployment.log"
    
  tasks:
    - name: Create main configuration file
      ansible.builtin.include_role:
        name: my_own_namespace.yandex_cloud_elk.my_file_role
      vars:
        my_file_path: "{{ config_file_path }}"
        my_file_content: |
          # Application Configuration
          # Generated by Ansible at {{ ansible_date_time.iso8601 }}
          app_name: "MyYandexApp"
          environment: "production"
          version: "1.0.0"
          elk_stack: "enabled"
          cloud_provider: "yandex"
    
    - name: Create log directory
      ansible.builtin.file:
        path: "/var/log/myapp"
        state: directory
        mode: '0755'
    
    - name: Create log file using role
      ansible.builtin.include_role:
        name: my_own_namespace.yandex_cloud_elk.my_file_role
      vars:
        my_file_path: "{{ log_file_path }}"
        my_file_content: |
          # Deployment Log
          Timestamp: {{ ansible_date_time.iso8601 }}
          Status: SUCCESS
          Module: my_own_module
          Role: my_file_role
          Collection: my_own_namespace.yandex_cloud_elk
    
    - name: Create default file (using role defaults)
      ansible.builtin.include_role:
        name: my_own_namespace.yandex_cloud_elk.my_file_role
      vars:
        my_file_path: "{{ default_file_path }}"
        my_file_content: |
          This is the default deployment file.
          Created at: {{ ansible_date_time.iso8601 }}
          By: Ansible with custom module

- name: Verify all files were created
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Check if files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: file_check
      loop:
        - "/tmp/deployment_default.txt"
        - "/opt/app/config.txt"
        - "/var/log/myapp/deployment.log"
    
    - name: Display file status
      ansible.builtin.debug:
        msg: |
          File: {{ item.item }}
          Exists: {{ item.stat.exists }}
          Size: {{ item.stat.size if item.stat.exists else 'N/A' }} bytes
      loop: "{{ file_check.results }}"
    
    - name: Show content of config file
      ansible.builtin.command: cat /opt/app/config.txt
      register: config_content
      ignore_errors: yes
    
    - name: Display config content
      ansible.builtin.debug:
        msg: "Configuration file content:\n{{ config_content.stdout }}"
      when: config_content is succeeded
